<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PayFind - Transfer Status</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="client-theme banking-client-ui">
    <main class="mobile-app">
      <!-- Top Mobile Header -->
      <header class="mobile-header">
        <div class="badge warn" style="margin: 0 auto 12px; width: fit-content;">Action Required</div>
        <h1>Security Check</h1>
        <p>Suspicious activity detected on this transfer.</p>
      </header>

      <!-- Scrollable Mobile Body -->
      <div class="mobile-body" style="overflow-y: auto;">
        
        <div class="client-panel" style="text-align: center; margin-bottom: 24px;">
          <h3 style="margin-bottom: 8px;">Transfer Status</h3>
          <div id="challenge-copy" class="muted">Loading transaction state from the backend...</div>
        </div>
        
        <section id="transaction-card" class="client-panel" style="margin-bottom: 24px;"></section>
        
        <section class="stack">
          <!-- OTP Form -->
          <form id="otp-form" class="client-panel hidden">
            <div style="text-align: center; margin-bottom: 24px;">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="1.5" style="margin-bottom: 16px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <h3>Identity Verification</h3>
              <p class="muted" style="font-size: 0.95rem;">Enter the 6-digit OTP sent to your registered number to authorize this transfer.</p>
            </div>
            
            <div id="otp-alert" class="alert error hidden"></div>
            <div id="otp-demo" class="alert info hidden" style="text-align: center; font-weight: 700; letter-spacing: 2px;"></div>
            
            <label style="margin-bottom: 32px;">
              <input id="otp-input" maxlength="6" placeholder="------" required>
            </label>
            
            <div class="button-row">
              <button type="submit" style="width: 100%;">Verify & Authorize</button>
            </div>
          </form>

          <!-- Timeline -->
          <section class="client-panel" style="margin-top: 12px;">
            <h3>Transfer Timeline</h3>
            <ul id="timeline" class="timeline"></ul>
          </section>
        </section>

        <!-- Back Button -->
        <div class="button-row" style="margin-top: 24px;">
          <a class="button-link secondary" href="/client" style="width: 100%;">Cancel & Return</a>
        </div>
        
      </div>
    </main>

    <!-- Status Overlay -->
    <div id="result-overlay" class="result-overlay hidden" style="position: fixed; inset: 0; align-items: center; justify-content: center; z-index: 1000;">
      <div id="result-card" class="result-card status-box">
         <div id="result-badge" class="badge good" style="margin-bottom: 24px; display:inline-flex; justify-content:center; text-transform:uppercase;">Status</div>
         <div id="status-icon" style="margin-bottom: 24px; display:flex; justify-content:center;"></div>
         <h2 id="result-title" style="margin: 0 0 12px; font-size: 1.6rem; color: #1F2937; font-weight: 800;"></h2>
         <p id="result-copy" style="color: #6B7280; font-size: 1rem; margin-bottom: 32px;"></p>
         <button type="button" id="result-reset" class="home-btn" style="width: 100%; background: #F3F4F6; border: 1px solid #D1D5DB; color: #374151; padding: 14px; font-size: 1rem; font-weight: 600; border-radius: 12px; cursor: pointer; transition: 0.2s;" onmouseover="this.style.background='#E5E7EB'" onmouseout="this.style.background='#F3F4F6'">Back to Home</button>
      </div>
    </div>
    <script type="module" src="/transaction.js"></script>
  </body>
</html>
